<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grind Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --green: #3fb950; --blue: #58a6ff; --muted: #8b949e;
            --fg: #c9d1d9; --yellow: #e3b341; --red: #f85149;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--fg); font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
        .navbar { background: var(--surface) !important; border-bottom: 1px solid var(--border); }
        .navbar-brand { color: var(--blue) !important; font-weight: 700; }
        .navbar-brand span { color: var(--green); }
        .nav-link { color: var(--muted) !important; }
        .nav-link:hover { color: var(--fg) !important; }
        .btn-primary { background: transparent; border: 1px solid var(--blue); color: var(--blue); font-family: 'JetBrains Mono', monospace; }
        .btn-primary:hover { background: var(--blue); color: var(--bg); }
        .btn-success { background: transparent; border: 1px solid var(--green); color: var(--green); font-family: 'JetBrains Mono', monospace; }
        .btn-success:hover { background: var(--green); color: var(--bg); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
        .form-control, .form-select { background: var(--bg); border: 1px solid var(--border); color: var(--fg); font-family: 'JetBrains Mono', monospace; }
        .form-control:focus, .form-select:focus { background: var(--bg); border-color: var(--blue); color: var(--fg); box-shadow: 0 0 0 3px rgba(88,166,255,0.1); }
        .form-label { color: var(--muted); font-size: 0.8rem; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--blue); }
        .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .stat-card.green .stat-value { color: var(--green); }
        .stat-card.yellow .stat-value { color: var(--yellow); }
        .entry-row { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 8px; transition: border-color 0.18s; }
        .entry-row:hover { border-color: var(--blue); }
        .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .alert-error { background: rgba(248,81,73,0.1); border: 1px solid var(--red); color: var(--red); border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.82rem; }
        .alert-success { background: rgba(63,185,80,0.1); border: 1px solid var(--green); color: var(--green); border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.82rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/"><span>&lt;/&gt;</span> grind-tracker</a>
            <div class="d-flex gap-2" id="nav-auth">
                <a href="/login" class="btn btn-sm btn-primary">login</a>
                <a href="/register" class="btn btn-sm btn-success">register</a>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <div id="app-content"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/tracker/js/app.js"></script>
</body>
</html>
